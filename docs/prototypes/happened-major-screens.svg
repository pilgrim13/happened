<svg width="1800" height="2600" viewBox="0 0 1800 2600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="2600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070D"/>
      <stop offset="0.45" stop-color="#071218"/>
      <stop offset="1" stop-color="#0C1116"/>
    </linearGradient>
    <linearGradient id="limeCyan" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#39D9F2"/>
      <stop offset="1" stop-color="#C7F95B"/>
    </linearGradient>
    <linearGradient id="coralYellow" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FF6F61"/>
      <stop offset="1" stop-color="#F8D84E"/>
    </linearGradient>
    <linearGradient id="feedOpen" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#20313A"/>
      <stop offset="0.48" stop-color="#315D62"/>
      <stop offset="1" stop-color="#05070D"/>
    </linearGradient>
    <linearGradient id="feedLocked" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1C1420"/>
      <stop offset="0.52" stop-color="#225C66"/>
      <stop offset="1" stop-color="#05070D"/>
    </linearGradient>
    <linearGradient id="mapWash" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#061116"/>
      <stop offset="0.5" stop-color="#10251F"/>
      <stop offset="1" stop-color="#1C1014"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <style>
      .title { font: 900 44px Avenir Next, Arial, sans-serif; fill: #F5F7F2; letter-spacing: 0; }
      .subtitle { font: 700 20px Avenir Next, Arial, sans-serif; fill: rgba(245,247,242,.68); letter-spacing: 0; }
      .label { font: 900 13px Avenir Next, Arial, sans-serif; fill: #C7F95B; letter-spacing: 1.6px; }
      .phoneTitle { font: 900 25px Avenir Next, Arial, sans-serif; fill: #F5F7F2; letter-spacing: 0; }
      .body { font: 700 14px Avenir Next, Arial, sans-serif; fill: rgba(245,247,242,.72); letter-spacing: 0; }
      .small { font: 800 11px Avenir Next, Arial, sans-serif; fill: rgba(245,247,242,.62); letter-spacing: 0; }
      .tiny { font: 900 9px Avenir Next, Arial, sans-serif; fill: rgba(245,247,242,.7); letter-spacing: 0; }
      .ink { fill: #05070D; }
      .panel { fill: rgba(13,18,26,.72); stroke: rgba(255,255,255,.12); stroke-width: 1; }
      .phone { fill: #05070D; stroke: rgba(255,255,255,.22); stroke-width: 2; }
      .screenName { font: 900 16px Avenir Next, Arial, sans-serif; fill: #39D9F2; letter-spacing: 0; }
      .metric { font: 900 18px Avenir Next, Arial, sans-serif; fill: #F5F7F2; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1800" height="2600" fill="url(#bg)"/>
  <rect x="70" y="72" width="1660" height="174" rx="8" fill="rgba(245,247,242,.04)" stroke="rgba(255,255,255,.10)"/>
  <text x="110" y="142" class="label">HAPPENED DESIGN PROTOTYPE</text>
  <text x="110" y="198" class="title">Location-locked memories, opened by returning to the place.</text>
  <text x="110" y="232" class="subtitle">Dark immersive feed, spatial heat, verified capture, monthly place stories, and revisit recall.</text>

  <!-- Phone 1: Onboarding -->
  <g transform="translate(100 310)">
    <text x="0" y="-26" class="screenName">01 Onboarding / Auth</text>
    <rect class="phone" width="360" height="760" rx="42"/>
    <rect x="18" y="18" width="324" height="724" rx="30" fill="#071016"/>
    <circle cx="180" cy="74" r="44" fill="url(#limeCyan)" opacity=".95"/>
    <text x="64" y="174" class="label">HERE, THEN AGAIN</text>
    <text x="42" y="225" class="phoneTitle">Moments open when you return.</text>
    <text x="42" y="272" class="body">Leave memories at real places. Revisit to unlock your past and your friends' stories.</text>
    <rect x="42" y="332" width="276" height="54" rx="8" fill="#F5F7F2"/>
    <text x="98" y="365" font-family="Avenir Next, Arial" font-size="15" font-weight="900" fill="#05070D">Continue with Apple</text>
    <rect x="42" y="398" width="276" height="54" rx="8" fill="rgba(245,247,242,.08)" stroke="rgba(255,255,255,.16)"/>
    <text x="98" y="431" font-family="Avenir Next, Arial" font-size="15" font-weight="900" fill="#F5F7F2">Continue with Google</text>
    <rect x="42" y="486" width="276" height="144" rx="8" class="panel"/>
    <text x="62" y="522" class="small">Permission sequence</text>
    <circle cx="68" cy="554" r="6" fill="#39D9F2"/><text x="84" y="558" class="body">Location for check-in</text>
    <circle cx="68" cy="586" r="6" fill="#C7F95B"/><text x="84" y="590" class="body">Camera for memories</text>
    <circle cx="68" cy="618" r="6" fill="#FF6F61"/><text x="84" y="622" class="body">Recall notifications</text>
    <text x="42" y="686" class="small">Event-based verification. No constant tracking.</text>
  </g>

  <!-- Phone 2: Home open -->
  <g transform="translate(520 310)">
    <text x="0" y="-26" class="screenName">02 Home / Open Memory</text>
    <rect class="phone" width="360" height="760" rx="42"/>
    <rect x="18" y="18" width="324" height="724" rx="30" fill="url(#feedOpen)"/>
    <rect x="240" y="70" width="72" height="620" transform="rotate(13 240 70)" fill="#C7F95B" opacity=".13"/>
    <rect x="48" y="154" width="170" height="230" rx="8" fill="rgba(255,255,255,.10)" stroke="rgba(255,255,255,.18)" transform="rotate(-7 48 154)"/>
    <rect x="174" y="258" width="128" height="180" rx="8" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.14)" transform="rotate(6 174 258)"/>
    <text x="38" y="70" class="phoneTitle">Happened</text>
    <rect x="38" y="96" width="86" height="30" rx="15" fill="#F5F7F2"/><text x="57" y="116" font-family="Avenir Next, Arial" font-size="11" font-weight="900" fill="#05070D">Following</text>
    <rect x="132" y="96" width="66" height="30" rx="15" fill="rgba(5,7,13,.35)" stroke="rgba(255,255,255,.12)"/><text x="150" y="116" class="tiny">Nearby</text>
    <rect x="206" y="96" width="74" height="30" rx="15" fill="rgba(5,7,13,.35)" stroke="rgba(255,255,255,.12)"/><text x="222" y="116" class="tiny">Memories</text>
    <rect x="38" y="492" width="172" height="30" rx="15" fill="url(#limeCyan)"/><text x="58" y="512" font-family="Avenir Next, Arial" font-size="11" font-weight="900" fill="#05070D">Open here · 84m / 200m</text>
    <text x="38" y="566" font-family="Avenir Next, Arial" font-size="34" font-weight="900" fill="#F5F7F2">Seolleung</text>
    <text x="38" y="605" font-family="Avenir Next, Arial" font-size="34" font-weight="900" fill="#F5F7F2">Station Cafe</text>
    <text x="38" y="632" class="body">Rain on the glass, three years later, same corner seat.</text>
    <circle cx="66" cy="680" r="18" fill="rgba(5,7,13,.65)" stroke="#C7F95B" stroke-width="2"/><text x="59" y="687" font-family="Avenir Next, Arial" font-size="18" font-weight="900" fill="#F5F7F2">J</text>
    <text x="94" y="674" class="body">Junn</text><text x="94" y="694" class="small">@junn · Followers</text>
    <g transform="translate(302 430)">
      <circle cx="0" cy="0" r="22" fill="rgba(5,7,13,.5)" stroke="rgba(255,255,255,.16)"/><text x="-8" y="5" class="tiny">18</text>
      <circle cx="0" cy="62" r="22" fill="rgba(5,7,13,.5)" stroke="rgba(255,255,255,.16)"/><text x="-8" y="67" class="tiny">4</text>
      <circle cx="0" cy="124" r="22" fill="rgba(5,7,13,.5)" stroke="rgba(255,255,255,.16)"/><text x="-8" y="129" class="tiny">9</text>
    </g>
  </g>

  <!-- Phone 3: Home locked -->
  <g transform="translate(940 310)">
    <text x="0" y="-26" class="screenName">03 Home / Locked Preview</text>
    <rect class="phone" width="360" height="760" rx="42"/>
    <rect x="18" y="18" width="324" height="724" rx="30" fill="url(#feedLocked)"/>
    <rect x="40" y="144" width="250" height="420" rx="8" fill="rgba(255,255,255,.14)" filter="url(#softBlur)" opacity=".72"/>
    <rect x="44" y="244" width="272" height="166" rx="8" fill="rgba(5,7,13,.58)" stroke="rgba(255,255,255,.15)"/>
    <text x="122" y="302" class="phoneTitle">Preview only</text>
    <text x="78" y="338" class="body">Return to Hongdae Alley Stage</text>
    <text x="108" y="361" class="body">to open this memory.</text>
    <rect x="38" y="492" width="192" height="30" rx="15" fill="url(#coralYellow)"/><text x="55" y="512" font-family="Avenir Next, Arial" font-size="11" font-weight="900" fill="#05070D">Locked by place · 1.3km / 200m</text>
    <text x="38" y="566" font-family="Avenir Next, Arial" font-size="33" font-weight="900" fill="#F5F7F2">Hongdae Alley</text>
    <text x="38" y="604" font-family="Avenir Next, Arial" font-size="33" font-weight="900" fill="#F5F7F2">Stage</text>
    <text x="38" y="632" class="body">The chorus everyone remembered before the lights went out.</text>
  </g>

  <!-- Phone 4: Map -->
  <g transform="translate(1360 310)">
    <text x="0" y="-26" class="screenName">04 Map / Place Field</text>
    <rect class="phone" width="360" height="760" rx="42"/>
    <rect x="18" y="18" width="324" height="724" rx="30" fill="#071016"/>
    <text x="38" y="70" class="label">NEARBY PLACES</text>
    <text x="38" y="111" class="phoneTitle">Seoul memory field</text>
    <rect x="38" y="142" width="284" height="460" rx="8" fill="url(#mapWash)" stroke="rgba(255,255,255,.13)"/>
    <line x1="24" y1="340" x2="344" y2="248" stroke="rgba(255,255,255,.1)"/>
    <line x1="178" y1="128" x2="214" y2="612" stroke="rgba(255,255,255,.09)"/>
    <line x1="78" y1="470" x2="290" y2="430" stroke="#39D9F2" stroke-width="3" opacity=".55"/>
    <circle cx="198" cy="370" r="20" fill="#39D9F2" stroke="#F5F7F2" stroke-width="2"/>
    <g>
      <rect x="188" y="250" width="102" height="34" rx="17" fill="url(#limeCyan)"/><text x="211" y="272" font-family="Avenir Next, Arial" font-size="10" font-weight="900" fill="#05070D">Seolleung</text>
      <rect x="80" y="382" width="86" height="34" rx="17" fill="url(#limeCyan)" opacity=".82"/><text x="104" y="404" font-family="Avenir Next, Arial" font-size="10" font-weight="900" fill="#05070D">Office</text>
      <rect x="212" y="450" width="95" height="34" rx="17" fill="url(#coralYellow)" opacity=".75"/><text x="235" y="472" font-family="Avenir Next, Arial" font-size="10" font-weight="900" fill="#05070D">Cafe</text>
      <rect x="92" y="520" width="110" height="34" rx="17" fill="url(#coralYellow)" opacity=".82"/><text x="116" y="542" font-family="Avenir Next, Arial" font-size="10" font-weight="900" fill="#05070D">School Yard</text>
    </g>
    <rect x="38" y="620" width="284" height="10" rx="5" fill="url(#coralYellow)"/>
    <rect x="38" y="653" width="284" height="56" rx="8" class="panel"/>
    <circle cx="62" cy="681" r="6" fill="#C7F95B"/><text x="80" y="678" class="body">Seolleung</text><text x="250" y="678" class="small">Open</text>
    <text x="80" y="699" class="small">12 memories nearby</text>
  </g>

  <!-- Phone 5: Capture -->
  <g transform="translate(100 1250)">
    <text x="0" y="-26" class="screenName">05 Capture / Check-in Token</text>
    <rect class="phone" width="360" height="760" rx="42"/>
    <rect x="18" y="18" width="324" height="724" rx="30" fill="#071016"/>
    <text x="38" y="70" class="label">CAPTURE HERE</text>
    <text x="38" y="110" class="phoneTitle">Seolleung Station Cafe</text>
    <rect x="38" y="148" width="284" height="430" rx="8" fill="rgba(57,217,242,.12)" stroke="rgba(255,255,255,.14)"/>
    <rect x="58" y="168" width="244" height="1" fill="rgba(255,255,255,.28)"/>
    <rect x="58" y="558" width="244" height="1" fill="rgba(255,255,255,.28)"/>
    <circle cx="180" cy="360" r="52" fill="rgba(245,247,242,.07)" stroke="rgba(245,247,242,.22)"/>
    <text x="98" y="434" class="body">Verified place capture</text>
    <rect x="38" y="596" width="284" height="70" rx="8" class="panel"/>
    <circle cx="70" cy="631" r="19" fill="rgba(199,249,91,.12)"/>
    <text x="102" y="627" class="body">Check-in token ready</text>
    <text x="102" y="648" class="small">120m radius · 12h upload window</text>
    <circle cx="180" cy="704" r="38" fill="none" stroke="#FF6F61" stroke-width="3"/>
    <circle cx="180" cy="704" r="28" fill="#F5F7F2"/>
    <circle cx="94" cy="704" r="25" fill="rgba(245,247,242,.08)" stroke="rgba(255,255,255,.12)"/>
    <circle cx="266" cy="704" r="25" fill="rgba(245,247,242,.08)" stroke="rgba(255,255,255,.12)"/>
    <text x="257" y="709" class="tiny">12h</text>
  </g>

  <!-- Phone 6: Place detail -->
  <g transform="translate(520 1250)">
    <text x="0" y="-26" class="screenName">06 Place Detail / Monthly Stories</text>
    <rect class="phone" width="360" height="760" rx="42"/>
    <rect x="18" y="18" width="324" height="724" rx="30" fill="#071016"/>
    <rect x="18" y="18" width="324" height="230" rx="30" fill="url(#feedOpen)"/>
    <rect x="38" y="172" width="172" height="30" rx="15" fill="url(#limeCyan)"/><text x="62" y="192" font-family="Avenir Next, Arial" font-size="11" font-weight="900" fill="#05070D">Open within 200m</text>
    <text x="38" y="282" font-family="Avenir Next, Arial" font-size="33" font-weight="900" fill="#F5F7F2">Seolleung</text>
    <text x="38" y="320" font-family="Avenir Next, Arial" font-size="33" font-weight="900" fill="#F5F7F2">Station Cafe</text>
    <text x="38" y="350" class="body">46 memories · 12 friends · Seoul</text>
    <rect x="38" y="382" width="284" height="82" rx="8" class="panel"/>
    <text x="58" y="416" class="metric">April 2026</text>
    <text x="58" y="442" class="small">Checked in after lunch · Window seat note</text>
    <rect x="38" y="482" width="284" height="82" rx="8" class="panel"/>
    <text x="58" y="516" class="metric">November 2025</text>
    <text x="58" y="542" class="small">Locked until you return to this place</text>
    <rect x="38" y="582" width="284" height="82" rx="8" fill="rgba(199,249,91,.10)" stroke="rgba(199,249,91,.28)"/>
    <text x="58" y="616" class="metric">April 2023</text>
    <text x="58" y="642" class="small">Same corner table · Recalled today</text>
  </g>

  <!-- Phone 7: Recall -->
  <g transform="translate(940 1250)">
    <text x="0" y="-26" class="screenName">07 Revisit Recall</text>
    <rect class="phone" width="360" height="760" rx="42"/>
    <rect x="18" y="18" width="324" height="724" rx="30" fill="#071016"/>
    <text x="38" y="74" class="label">YOU ARE BACK</text>
    <text x="38" y="120" class="phoneTitle">3 years ago at Seolleung Station Cafe</text>
    <rect x="38" y="172" width="284" height="332" rx="8" fill="url(#feedOpen)" stroke="rgba(255,255,255,.14)"/>
    <rect x="68" y="224" width="174" height="210" rx="8" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.18)" transform="rotate(-5 68 224)"/>
    <rect x="54" y="536" width="252" height="68" rx="8" fill="rgba(199,249,91,.10)" stroke="rgba(199,249,91,.28)"/>
    <text x="76" y="570" class="body">Reopened because you are</text>
    <text x="76" y="591" class="body">back within 200m.</text>
    <rect x="54" y="626" width="118" height="46" rx="8" fill="#F5F7F2"/><text x="82" y="654" font-family="Avenir Next, Arial" font-size="13" font-weight="900" fill="#05070D">Open</text>
    <rect x="188" y="626" width="118" height="46" rx="8" fill="rgba(245,247,242,.08)" stroke="rgba(255,255,255,.12)"/><text x="222" y="654" class="body">Later</text>
  </g>

  <!-- Phone 8: Profile safety -->
  <g transform="translate(1360 1250)">
    <text x="0" y="-26" class="screenName">08 Profile / Safety Defaults</text>
    <rect class="phone" width="360" height="760" rx="42"/>
    <rect x="18" y="18" width="324" height="724" rx="30" fill="#071016"/>
    <circle cx="82" cy="88" r="36" fill="#C7F95B"/>
    <text x="70" y="101" font-family="Avenir Next, Arial" font-size="32" font-weight="900" fill="#05070D">J</text>
    <text x="134" y="82" class="phoneTitle">Junn</text>
    <text x="134" y="108" class="body">@junn</text>
    <rect x="38" y="154" width="86" height="76" rx="8" class="panel"/><text x="68" y="188" class="metric">18</text><text x="62" y="211" class="small">Places</text>
    <rect x="136" y="154" width="86" height="76" rx="8" class="panel"/><text x="166" y="188" class="metric">46</text><text x="154" y="211" class="small">Memories</text>
    <rect x="234" y="154" width="86" height="76" rx="8" class="panel"/><text x="260" y="188" class="metric">128</text><text x="250" y="211" class="small">Followers</text>
    <rect x="38" y="260" width="284" height="114" rx="8" fill="rgba(57,217,242,.10)" stroke="rgba(57,217,242,.30)"/>
    <text x="58" y="294" class="label">DEFAULT VISIBILITY</text>
    <text x="58" y="332" class="phoneTitle">Followers only</text>
    <text x="58" y="356" class="small">Public is optional per memory.</text>
    <rect x="38" y="414" width="284" height="56" rx="8" class="panel"/><text x="60" y="448" class="body">Blocked accounts</text><text x="286" y="448" class="small">0</text>
    <rect x="38" y="484" width="284" height="56" rx="8" class="panel"/><text x="60" y="518" class="body">Reports and hidden posts</text><text x="260" y="518" class="small">Ready</text>
    <rect x="38" y="554" width="284" height="56" rx="8" class="panel"/><text x="60" y="588" class="body">Revisit recall alerts</text><text x="284" y="588" class="small">On</text>
    <rect x="38" y="624" width="284" height="56" rx="8" class="panel"/><text x="60" y="658" class="body">Account deletion</text><text x="244" y="658" class="small">Available</text>
  </g>

  <rect x="100" y="2180" width="1600" height="260" rx="8" fill="rgba(245,247,242,.04)" stroke="rgba(255,255,255,.10)"/>
  <text x="138" y="2240" class="label">BUILD GUIDANCE</text>
  <text x="138" y="2294" class="title">Home quality first. Location lock second. Backend later.</text>
  <text x="138" y="2340" class="subtitle">This board defines the desired app feel before auth provider, map provider, storage, push, or test distribution decisions.</text>
  <rect x="138" y="2388" width="218" height="36" rx="18" fill="url(#limeCyan)"/>
  <text x="166" y="2411" font-family="Avenir Next, Arial" font-size="13" font-weight="900" fill="#05070D">Place-first hierarchy</text>
  <rect x="376" y="2388" width="244" height="36" rx="18" fill="url(#coralYellow)"/>
  <text x="405" y="2411" font-family="Avenir Next, Arial" font-size="13" font-weight="900" fill="#05070D">Locked preview states</text>
  <rect x="640" y="2388" width="230" height="36" rx="18" fill="rgba(245,247,242,.10)" stroke="rgba(255,255,255,.14)"/>
  <text x="670" y="2411" font-family="Avenir Next, Arial" font-size="13" font-weight="900" fill="#F5F7F2">Followers by default</text>
</svg>
