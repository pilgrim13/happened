services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: happened-postgres
    environment:
      POSTGRES_USER: happened
      POSTGRES_PASSWORD: happened
      POSTGRES_DB: happened
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - happened-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U happened -d happened"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    container_name: happened-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - happened-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot bootstrap: create dev bucket + public-read policy on /public/* prefix.
  minio-init:
    image: minio/mc:latest
    container_name: happened-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${S3_BUCKET:-happened-media-dev}
    entrypoint: >
      /bin/sh -c "
      set -eu;
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\";
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      printf '%s' '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":{\"AWS\":[\"*\"]},\"Action\":[\"s3:GetObject\"],\"Resource\":[\"arn:aws:s3:::'$$MINIO_BUCKET'/public/*\"]}]}' >/tmp/policy.json;
      mc anonymous set-json /tmp/policy.json local/$$MINIO_BUCKET || true;
      echo 'minio-init: bucket ready';
      "
    restart: "no"

  mailhog:
    image: mailhog/mailhog:latest
    container_name: happened-mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8025/api/v2/messages"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  happened-postgres-data:
  happened-minio-data:
